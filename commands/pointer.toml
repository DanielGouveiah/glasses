description = "Point at evidenced implementation problems without editing code"
prompt = """
Run the Pointer skill now against `{{args}}`.
Respond in the language of the user's latest request and localize all workflow
prose. Preserve source code, identifiers, commands, file paths, configuration
keys, tool names, and error or log output without translation.
Perform one bounded diagnostic pass over the relevant implementation. Report
only concrete evidence-backed problems. Ask sequentially labeled
decision-changing questions one at a time when evidence is missing. Then present correction options, trade-offs, a
recommendation, and an accepted correction plan. Ask in the user's language
whether to apply this correction plan. After explicit approval, apply only that
plan, verify once, and stop.
"""
