description = "Review an implementation plan with Glasses"
prompt = """
Run the Glasses review workflow now. The requested mode is `{{args}}`.
Respond in the language of the user's latest request and localize all workflow
prose. Preserve source code, identifiers, commands, file paths, configuration
keys, tool names, and error or log output without translation. If no mode was
supplied, use high and identify that mode in the user's language.
Inspect the relevant repository context, ask at most one decision-changing
question at a time labeled Q1, Q2, and so on, and produce a decision-complete
replacement plan before
implementation.
"""
